<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Alive Market - Production Hub</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .oil-card, .sauce-card { transition: all 0.2s ease-in-out; }
        .oil-card:hover, .sauce-card:hover { transform: translateY(-2px); }
        .accordion-content { transition: max-height 0.3s ease-out, opacity 0.2s ease-out; }
        .accordion-content.collapsed { max-height: 0 !important; overflow: hidden; opacity: 0; padding-top: 0 !important; padding-bottom: 0 !important; margin-top: 0 !important; margin-bottom: 0 !important; border: none !important; }
        .toggle-icon { transition: transform 0.2s ease; }
        .toggle-icon.rotated { transform: rotate(-90deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <header class="bg-emerald-700 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-wide">FULLY ALIVE MARKET</h1>
                <p class="text-xs text-emerald-100 uppercase tracking-widest mt-0.5">R&D Lab & Commercial Costing Portal</p>
            </div>
            
            <nav class="flex bg-emerald-800/60 p-1 rounded-xl border border-emerald-600/30">
                <button onclick="switchTab('oil')" id="tabBtn_oil" class="px-4 py-2 text-xs font-bold rounded-lg transition-all bg-emerald-600 text-white shadow-xs cursor-pointer">
                    🌿 Oil & Skincare Lab
                </button>
                <button onclick="switchTab('sauce')" id="tabBtn_sauce" class="px-4 py-2 text-xs font-bold rounded-lg transition-all text-emerald-200 hover:text-white cursor-pointer">
                    🌶️ Sauce Lab
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">
        
        <div id="tabContent_oil" class="space-y-6">
            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div onclick="toggleSection('calcContent', 'calcArrow')" class="bg-slate-100/50 px-6 py-4 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition-colors border-b border-slate-200">
                    <div class="flex items-center gap-2">
                        <span class="text-xl">💰</span>
                        <h2 class="text-lg font-bold text-slate-900">Skincare Batch Formulation & Cost Engine</h2>
                    </div>
                    <span id="calcArrow" class="toggle-icon text-slate-500 font-bold text-lg">▼</span>
                </div>

                <div id="calcContent" class="accordion-content p-6 space-y-6">
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Target Yield Size</label>
                            <input type="number" id="batchSize" value="4" min="0.1" step="any" oninput="calculateFormulation()" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg outline-none text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Unit of Output</label>
                            <select id="batchUnit" onchange="calculateFormulation()" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg outline-none text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500">
                                <option value="oz">Fluid Ounces (fl oz)</option>
                                <option value="mL">Milliliters (mL)</option>
                                <option value="g">Grams (g)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Target Retail Container Size</label>
                            <select id="oilContainerSize" onchange="calculateFormulation()" class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg outline-none text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500 text-slate-700">
                                <option value="2">2 oz Sample Jar</option>
                                <option value="4" selected>4 oz Retail Jar (Sweet Relief Standard)</option>
                                <option value="8">8 oz Bulk Tub</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3">📦 Container Packaging Unit Costs</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs text-slate-600 mb-1">Jar/Tin Cost (per unit)</label>
                                <div class="relative rounded-md shadow-2xs">
                                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 text-xs">$</span>
                                    <input type="number" id="jarCost" value="1.10" min="0" step="0.01" class="w-full pl-7 pr-3 py-1.5 bg-white border border-slate-300 rounded-lg outline-none text-xs focus:ring-2 focus:ring-emerald-500" oninput="calculateFormulation()">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-600 mb-1">Lid Cost (per unit)</label>
                                <div class="relative rounded-md shadow-2xs">
                                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 text-xs">$</span>
                                    <input type="number" id="lidCost" value="0.25" min="0" step="0.01" class="w-full pl-7 pr-3 py-1.5 bg-white border border-slate-300 rounded-lg outline-none text-xs focus:ring-2 focus:ring-emerald-500" oninput="calculateFormulation()">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-600 mb-1">Label Cost (per unit)</label>
                                <div class="relative rounded-md shadow-2xs">
                                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 text-xs">$</span>
                                    <input type="number" id="labelCost" value="0.40" min="0" step="0.01" class="w-full pl-7 pr-3 py-1.5 bg-white border border-slate-300 rounded-lg outline-none text-xs focus:ring-2 focus:ring-emerald-500" oninput="calculateFormulation()">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                        <div class="flex justify-between items-center">
                            <h3 class="text-sm font-bold text-slate-700">Formulation Components Matrix</h3>
                            <button type="button" onclick="addOilMaterialRow()" class="text-xs font-bold text-emerald-700 hover:text-emerald-900 bg-emerald-100 hover:bg-emerald-200 px-2.5 py-1 rounded transition-colors cursor-pointer">+ Add Material Component</button>
                        </div>
                        <div id="oilRowsContainer" class="space-y-2"></div>
                    </div>

                    <div class="bg-slate-900 text-slate-100 p-5 rounded-xl shadow-inner">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                            <div>
                                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Total Product Mass</p>
                                <p id="oilTotalMassResult" class="text-base font-mono font-bold text-white mt-0.5">--</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Estimated Jar Yield</p>
                                <p id="oilJarYieldResult" class="text-base font-mono font-bold text-emerald-400 mt-0.5">--</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-amber-400 uppercase font-bold tracking-wider">Total Batch COGS</p>
                                <p id="totalCostResult" class="text-xl font-mono font-extrabold text-amber-400 mt-0.5">$0.00</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-emerald-400 uppercase font-bold tracking-wider">True Cost Per Unit</p>
                                <p id="unitCostResult" class="text-xl font-mono font-extrabold text-emerald-400 mt-0.5">$0.00</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="recipeName" placeholder="Give this experimental recipe a name..." class="flex-1 px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:bg-white focus:ring-2 focus:ring-emerald-500">
                        <button type="button" onclick="saveRecipe()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm px-5 py-2 rounded-lg shadow-sm transition-all cursor-pointer">💾 Save Blueprint</button>
                    </div>
                </div>
            </section>
